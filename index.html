<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://unpkg.com/tone@14/build/Tone.js"></script>
<style>
*{ box-sizing:border-box; }
html,body{
  margin:0; padding:0; overflow:hidden;
  background:black; width:100%; height:100%;
  -webkit-user-select:none; user-select:none;
  -webkit-touch-callout:none;
}
canvas{
  position:fixed; touch-action:none;
  top:0; left:0; width:100%; height:100%;
}
#startButton{
  position:fixed; z-index:10;
  top:50%; left:50%; transform:translate(-50%,-50%);
  padding:18px 36px; font-size:18px;
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-weight:600; letter-spacing:.05em;
  border:none; border-radius:14px;
  background:white; color:black; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  min-width:200px; min-height:58px;
}
#startButton:active{ opacity:.7; }

/* ── 共通フローティングボタン ── */
.fab{
  position:fixed; z-index:10;
  width:54px; height:54px; border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  color:white; cursor:pointer;
  display:none; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s, opacity .15s;
}
.fab:active{ background:rgba(255,255,255,0.38); }

#flipBtn{ bottom:28px; right:28px;   font-size:26px; }
#xyBtn  { bottom:28px; right:96px;   font-size:11px; font-weight:600;
          font-family:'Helvetica Neue',Arial,sans-serif; letter-spacing:.04em; }
#bpmBtn { bottom:28px; right:164px;  font-size:12px; font-weight:600;
          font-family:'Helvetica Neue',Arial,sans-serif; line-height:1.25;
          flex-direction:column; }

#xyBtn.off{ opacity:.4; }

/* ── BPMスライダー ── */
#bpmSlider{
  position:fixed; z-index:10;
  bottom:94px; right:137px;
  width:24px; height:130px;
  display:none; flex-direction:column;
  align-items:center; gap:8px;
}
#bpmSlider input[type=range]{
  writing-mode:vertical-lr; direction:rtl;
  appearance:slider-vertical; -webkit-appearance:slider-vertical;
  width:24px; height:110px;
  cursor:pointer; accent-color:white; opacity:.9;
}
#bpmSlider span{
  color:rgba(255,255,255,0.7);
  font-size:10px;
  font-family:'Helvetica Neue',Arial,sans-serif;
  letter-spacing:.04em;
}

/* ── 音量：左端の縦バー ── */
#volTrack{
  position:fixed; z-index:10;
  left:18px; bottom:72px;
  width:32px; height:140px;
  display:none;
  cursor:pointer; touch-action:none;
  -webkit-tap-highlight-color:transparent;
}
#volTrack::before{
  content:'';
  position:absolute;
  left:14px; top:0; bottom:0; width:3px;
  background:rgba(255,255,255,0.13);
  border-radius:2px;
}
#volFill{
  position:absolute;
  left:14px; bottom:0; width:3px;
  background:rgba(255,255,255,0.75);
  border-radius:2px;
  height:75%;
  transition:height .08s ease;
}
#volFill::after{
  content:'';
  position:absolute;
  top:-3px; left:-3px;
  width:9px; height:3px;
  background:white;
  border-radius:1.5px;
}
</style>
</head>
<body>
<button id="startButton">カメラを開始</button>
<video id="video" autoplay playsinline muted style="display:none;"></video>
<canvas id="canvas"></canvas>

<button id="flipBtn" class="fab">⟳</button>
<button id="xyBtn"   class="fab">X/Y</button>
<button id="bpmBtn"  class="fab">
  <span id="bpmDisplay">84</span>
  <span style="font-size:8px;opacity:.65;">BPM</span>
</button>

<div id="volTrack"><div id="volFill"></div></div>

<div id="bpmSlider">
  <input type="range" id="bpmRange" min="60" max="130" value="84">
  <span id="bpmLabel">84</span>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  CANVAS / CAMERA GLOBALS
// ════════════════════════════════════════════════════════════════════
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d');
const video       = document.getElementById('video');
const startButton = document.getElementById('startButton');
const flipBtn     = document.getElementById('flipBtn');
const xyBtn       = document.getElementById('xyBtn');
let   showXY      = true;

const isMobile   = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const FRAME_SKIP = isMobile ? 3 : 2;
const proc  = document.createElement('canvas');
const pCtx  = proc.getContext('2d', { willReadFrequently: true });
const PROC_W = isMobile ? 200 : 320, PROC_H = isMobile ? 150 : 240;
proc.width = PROC_W; proc.height = PROC_H;

let prevGray      = null;
let smoothDens    = null;
let verts         = [];
let stableVerts   = [];
let frameTick     = 0;
let currentStream = null;
let currentFacing = 'user';

// ════════════════════════════════════════════════════════════════════
//  GENERATIVE SOUND FIELD ENGINE
//  自然環境の統計情報 → 持続的な音響空間
// ════════════════════════════════════════════════════════════════════

// ── HARMONY ──
// D Dorian 安全な四度堆積（F+B tritone を含まない）
const QUARTAL_3 = [
  ['D','G','C'],
  ['G','C','F'],
  ['A','D','G'],
  ['E','A','D'],
  ['B','E','A'],
];
const QUARTAL_4 = [
  ['D','G','C','F'],
  ['A','D','G','C'],
  ['E','A','D','G'],
  ['B','E','A','D'],
];
const BASS_ROOTS = ['D2','G2','A2','C2','E2'];

// ── ENVIRONMENTAL STATS ──
let envStats = { meanX:0, meanY:0, variance:0, energy:0, density:0, flow:0 };
let _pMX = 0, _pMY = 0;

function computeStats(pts, W, H) {
  if (!pts || pts.length === 0) return null;
  const cx = W/2, cy = H/2, n = pts.length;
  let sX=0, sY=0;
  for (const v of pts) { sX += (v[0]-cx)/(W/2); sY += (v[1]-cy)/(H/2); }
  const mX=sX/n, mY=sY/n;
  let vSum=0, eSum=0;
  for (const v of pts) {
    const nx=(v[0]-cx)/(W/2), ny=(v[1]-cy)/(H/2);
    vSum += (nx-mX)**2 + (ny-mY)**2;
    eSum += Math.sqrt((v[0]-cx)**2+(v[1]-cy)**2);
  }
  return {
    meanX: mX, meanY: mY,
    variance: Math.min(1, vSum/n/2),
    energy:   Math.min(1, eSum/n / Math.sqrt((W/2)**2+(H/2)**2)),
    density:  Math.min(1, n/8),
    flow:     Math.abs(mX-_pMX) + Math.abs(mY-_pMY),
  };
}

function smoothStats(raw) {
  const a = 0.20;
  if (!raw) {
    envStats.density += (0 - envStats.density) * 0.07;
    envStats.flow    += (0 - envStats.flow)    * 0.12;
    return;
  }
  envStats.meanX    += (raw.meanX    - envStats.meanX)    * a;
  envStats.meanY    += (raw.meanY    - envStats.meanY)    * a;
  envStats.variance += (raw.variance - envStats.variance) * a;
  envStats.energy   += (raw.energy   - envStats.energy)   * a;
  envStats.density  += (raw.density  - envStats.density)  * a;
  envStats.flow     += (raw.flow     - envStats.flow)     * 0.28;
  _pMX = raw.meanX; _pMY = raw.meanY;
}

// ── BPM ──
let userBpm   = 84;
let smoothBpm = 84;
let _bpmTick  = 0;

// ── PIANO STATE ──
// Y軸偏差が四度堆積ボイシングを直接決定する
let pianoActiveNotes = [];
let lastPianoMorphMs = 0;
let pianoLPF;
let pianoFilterCurrent = 1800;
let pianoFilterTarget  = 1800;
let _morphRefEnergy = 0;
let _morphRefY      = 0;

// Y軸位置 → 四度堆積ボイシングの選択
// -1(画面上部): pool[0] = 明るい/浮遊
// +1(画面下部): pool[最後] = 暗い/重厚
function getTargetChordNotes() {
  // y > 0.28 で4音ボイシングへ（より早く密な和声に）
  const pool = Math.abs(envStats.meanY) > 0.28 ? QUARTAL_4 : QUARTAL_3;
  const norm = Math.max(0, Math.min(1, (envStats.meanY + 1) / 2));
  const idx  = Math.min(pool.length - 1, Math.floor(norm * pool.length));

  // レジスター：係数を大きくして音域の変化幅を3オクターブに拡大
  // 上(-1)→oct6、中(0)→oct5、下(+1)→oct3
  const reg     = 0.5 - envStats.meanY * 0.65;
  const baseOct = Math.max(3, Math.min(6, Math.round(3 + reg * 4)));
  return pool[idx].map((n, i) => n + (baseOct + Math.floor(i / 2)));
}

// ── GUITAR STATE ──
let gPrevFlow   = 0;
let gPrevEnergy = 0;
let gPrevCount  = 0;
let guitarRestUntil = -1;

// ── BASS STATE ──
let bassActive      = false;
let bassRootIdx     = 0;
let lastBassMorphMs = 0;
let bassSynth;

// ── DRUM POLYRHYTHM STATE ──
// X軸偏差 → キック周期が 4〜13 に変化（8/4拍子〜8/13拍子）
let kickStep         = 0;
let smoothKickPeriod = 4.0;
let snareTick        = 0;  // 7-step cycle
let hatTick          = 0;  // 5-step cycle
let rimTick          = 0;  // 11-step polyrhythm layer

// ── SYNTH NODES ──
let toneReady  = false;
let pianoSynth, guitarSynth;
let kickSynth, snareSynth, hatSynth;

// ────────────────────────────────────────────
//  AUDIO INITIALIZATION
// ────────────────────────────────────────────
async function initAudio() {
  await Tone.start();
  await Tone.context.resume();

  const masterLimiter = new Tone.Limiter(-1).toDestination();

  // ─ リバーブ並列生成
  const pianoReverb  = new Tone.Reverb({ decay: 6.0,  wet: 0.52 });
  const guitarReverb = new Tone.Reverb({ decay: 12.0, wet: 0.68 });
  const bassReverb   = new Tone.Reverb({ decay: 2.5,  wet: 0.16 });
  const snareRev     = new Tone.Reverb({ decay: 1.4,  wet: 0.24 });
  await Promise.all([
    pianoReverb.generate(), guitarReverb.generate(),
    bassReverb.generate(),  snareRev.generate(),
  ]);

  // ─ Piano: felt / ambient warm
  //   harmonicity 2.0 + modulationIndex 0.7 → 倍音的な温かみ、ベル感を排除
  //   attack 0.20s / release 12.0s → 空気の滲みと持続
  const pianoComp   = new Tone.Compressor({ threshold: -22, ratio: 4, attack: 0.06, release: 0.35 });
  const pianoChorus = new Tone.Chorus({ frequency: 0.7, delayTime: 3.2, depth: 0.28, wet: 0.22 }).start();
  const pianoDelay  = new Tone.FeedbackDelay({ delayTime: '8n.', feedback: 0.20, wet: 0.14 });
  pianoLPF = new Tone.Filter({ frequency: 1800, type: 'lowpass', rolloff: -24 });
  pianoSynth = new Tone.PolySynth(Tone.FMSynth, {
    maxPolyphony:       4,
    harmonicity:        2.0,
    modulationIndex:    0.7,
    oscillator:         { type: 'sine' },
    envelope:           { attack: 0.20, decay: 3.0, sustain: 0.42, release: 12.0 },
    modulation:         { type: 'sine' },
    modulationEnvelope: { attack: 0.40, decay: 1.5, sustain: 0.01, release: 6.0 },
    volume: -4,
  });
  pianoSynth.chain(pianoComp, pianoChorus, pianoLPF, pianoDelay, pianoReverb, masterLimiter);

  // ─ Guitar: e-bow / shimmer
  //   sine + attack 2.5s → ゆっくり立ち上がるe-bow奏法
  //   深いコーラス (wet 0.75) → 光・水面・シマー感
  const guitarLPF      = new Tone.Filter({ frequency: 2400, type: 'lowpass' });
  const guitarChorus   = new Tone.Chorus({ frequency: 0.4, delayTime: 3.8, depth: 0.88, wet: 0.75 }).start();
  const guitarPingPong = new Tone.PingPongDelay({ delayTime: '4n', feedback: 0.38, wet: 0.34 });
  guitarSynth = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 2,
    oscillator: { type: 'sine' },
    envelope:   { attack: 2.5, decay: 0, sustain: 1.0, release: 8.0 },
    volume: -8,
  });
  guitarSynth.chain(guitarLPF, guitarChorus, guitarPingPong, guitarReverb, masterLimiter);

  // ─ Bass: 大地・重力
  const bassLPF = new Tone.Filter({ frequency: 420, type: 'lowpass' });
  bassSynth = new Tone.Synth({
    oscillator: { type: 'sine' },
    envelope:   { attack: 0.32, decay: 1.4, sustain: 0.80, release: 6.5 },
    volume: 0,
  });
  bassSynth.chain(bassLPF, bassReverb, masterLimiter);

  // ─ Kick
  kickSynth = new Tone.MembraneSynth({
    pitchDecay: 0.07, octaves: 7,
    envelope:   { attack: 0.001, decay: 0.30, sustain: 0, release: 0.18 },
    volume: -3,
  });
  kickSynth.connect(masterLimiter);

  // ─ Snare
  snareSynth = new Tone.NoiseSynth({
    noise:    { type: 'white' },
    envelope: { attack: 0.001, decay: 0.20, sustain: 0, release: 0.08 },
    volume: -12,
  });
  snareSynth.chain(snareRev, masterLimiter);

  // ─ Hat（11ステップゴーストノートも兼用）
  hatSynth = new Tone.NoiseSynth({
    noise:    { type: 'pink' },
    envelope: { attack: 0.001, decay: 0.055, sustain: 0, release: 0.022 },
    volume: -18,
  });
  hatSynth.connect(masterLimiter);

  Tone.Transport.bpm.value = smoothBpm;
  new Tone.Loop((t) => onDrumTick(t),       '16n').start(0);
  new Tone.Loop((t) => onPianoMorphTick(t), '4n' ).start(0);
  new Tone.Loop((t) => onBassManageTick(t), '2n' ).start('+2m');
  Tone.Transport.start();

  toneReady = true;
  Tone.Destination.volume.value = volToDb(volLevel);
}

// ────────────────────────────────────────────
//  AUDIO CONTEXT 復帰（iOS バックグラウンド復帰対策）
// ────────────────────────────────────────────
async function resumeAudio() {
  if (!toneReady) return;
  try {
    if (Tone.context.state !== 'running') {
      await Tone.context.resume();
    }
    if (Tone.Transport.state !== 'started') {
      Tone.Transport.start();
    }
  } catch (e) {}
}

// 定期的な状態監視（iOSがAudioContextをサイレントに停止するケースへの保険）
setInterval(() => {
  if (toneReady && Tone.context.state !== 'running') {
    Tone.context.resume().catch(() => {});
  }
}, 2000);

// ────────────────────────────────────────────
//  DRUM ENGINE — 自然の呼吸
// ────────────────────────────────────────────
function onDrumTick(time) {
  if (envStats.density < 0.04) {
    snareTick = (snareTick + 1) % (7 * 16);
    hatTick   = (hatTick   + 1) % (5 * 16);
    kickStep  = (kickStep  + 1) % 256;
    return;
  }

  // BPM: ユーザーベース + x偏差の環境揺らぎ
  const envDev = envStats.meanX * 14;
  smoothBpm   += (userBpm + envDev - smoothBpm) * 0.030;
  Tone.Transport.bpm.value = smoothBpm;

  // キック周期: X軸偏差 → 8/4拍子（period=4）〜 8/13拍子（period=13）
  // |meanX|=0 → 4ステップ毎（標準4拍子）
  // |meanX|=1 → 13ステップ毎（13/16的変拍子）
  const targetKickPeriod = 4 + Math.round(Math.abs(envStats.meanX) * 9);
  smoothKickPeriod += (targetKickPeriod - smoothKickPeriod) * 0.05;
  const kickPeriod = Math.max(4, Math.min(13, Math.round(smoothKickPeriod)));

  if (kickStep % kickPeriod === 0) {
    kickSynth.triggerAttackRelease('C1', '8n', time, 0.52 + envStats.energy * 0.36);
  }

  // スネア: 7ステップ位相ドリフト
  if (snareTick % 7 === 0 && envStats.density > 0.22) {
    snareSynth.triggerAttackRelease('8n', time);
  }

  // ハット: 5ステップ周期 × flow ゲート
  if (hatTick % 5 === 0 && envStats.flow > 0.016) {
    hatSynth.triggerAttackRelease('32n', time);
  }

  // 11-step polyrhythm ghost: 知覚限界下のグルーヴ・呼吸感
  if (rimTick % 11 === 0 && envStats.density > 0.12 && Math.random() < 0.60) {
    hatSynth.triggerAttackRelease('64n', time, 0.07 + Math.random() * 0.06);
  }

  snareTick = (snareTick + 1) % (7 * 16);
  hatTick   = (hatTick   + 1) % (5 * 16);
  kickStep  = (kickStep  + 1) % 256;
  rimTick   = (rimTick   + 1) % (11 * 16);

  checkGuitarTrigger(time);
}

// ────────────────────────────────────────────
//  GUITAR ENGINE — 光・水面・軌跡
// ────────────────────────────────────────────
// 「いつも鳴る」ではなく、環境変化の瞬間にのみ発音
function checkGuitarTrigger(time) {
  if (time < guitarRestUntil) return;
  if (envStats.density < 0.10) return;

  const dFlow   = envStats.flow   - gPrevFlow;
  const dEnergy = Math.abs(envStats.energy - gPrevEnergy);
  const dCount  = Math.abs(verts.length    - gPrevCount);

  const triggered = dFlow > 0.020 || dEnergy > 0.06 || dCount >= 2;
  if (triggered && Math.random() < 0.55) {
    triggerGuitarShimmer(time);
    guitarRestUntil = time + 1.5 + Math.random() * 3.0;
  }

  gPrevFlow   = envStats.flow;
  gPrevEnergy = envStats.energy;
  gPrevCount  = verts.length;
}

function triggerGuitarShimmer(time) {
  // ピアノと同じy軸ボイシングから上声部を取る（調性統一）
  const pool = Math.abs(envStats.meanY) > 0.45 ? QUARTAL_4 : QUARTAL_3;
  const norm = Math.max(0, Math.min(1, (envStats.meanY + 1) / 2));
  const idx  = Math.min(pool.length - 1, Math.floor(norm * pool.length));

  const reg     = 0.5 - envStats.meanY * 0.3;
  const baseOct = Math.max(4, Math.min(6, Math.round(4 + reg * 2)));

  const count = Math.random() < 0.38 ? 2 : 1;
  const notes = pool[idx].slice(-count).map((n, i) => n + (baseOct + i));
  const hold  = 3.5 + Math.random() * 4.5;
  const vel   = 0.14 + Math.random() * 0.20;

  guitarSynth.triggerAttackRelease(notes, hold, time, vel);
}

// ────────────────────────────────────────────
//  PIANO ENGINE — 持続和声フィールド
//  鳴る→止まる ではなく、鳴り続けながら変形する
// ────────────────────────────────────────────
function onPianoMorphTick(time) {
  const wallNow = Date.now();

  // 動きがなければ全ノートを解放（空間が静まる）
  if (envStats.density < 0.06) {
    if (pianoActiveNotes.length > 0) {
      pianoSynth.triggerRelease(pianoActiveNotes, time);
      pianoActiveNotes = [];
    }
    return;
  }

  // 最初の発音
  if (pianoActiveNotes.length === 0) {
    const notes = getTargetChordNotes();
    pianoSynth.triggerAttack(notes, time, 0.26 + envStats.energy * 0.22);
    pianoActiveNotes = [...notes];
    lastPianoMorphMs = wallNow;
    _morphRefEnergy  = envStats.energy;
    _morphRefY       = envStats.meanY;
    return;
  }

  // y軸が移動してボイシングが変わっているか確認
  const targetNotes = getTargetChordNotes();
  const targetSet   = new Set(targetNotes);
  const activeSet   = new Set(pianoActiveNotes);
  const notesChanged = targetNotes.some(n => !activeSet.has(n)) ||
                       pianoActiveNotes.some(n => !targetSet.has(n));

  // ノートが同じなら維持（変化なし）
  if (!notesChanged) {
    if (wallNow - lastPianoMorphMs > 5000) lastPianoMorphMs = wallNow;
    return;
  }

  // ノートが変わっている：y軸変化 or energy変化 or タイマーで反応
  const forceY      = Math.abs(envStats.meanY   - _morphRefY)      > 0.07;
  const forceEnergy = Math.abs(envStats.energy  - _morphRefEnergy) > 0.18;
  const timerReady  = wallNow - lastPianoMorphMs > 800 + Math.random() * 1500;

  if (!forceY && !forceEnergy && !timerReady) return;

  const toRelease = pianoActiveNotes.filter(n => !targetSet.has(n));
  if (toRelease.length > 0) pianoSynth.triggerRelease(toRelease, time);

  const toAttack = targetNotes.filter(n => !activeSet.has(n));
  if (toAttack.length > 0) {
    pianoSynth.triggerAttack(toAttack, time, 0.20 + envStats.energy * 0.18);
  }

  pianoActiveNotes = [...targetNotes];
  lastPianoMorphMs = wallNow;
  _morphRefEnergy  = envStats.energy;
  _morphRefY       = envStats.meanY;
}

// ────────────────────────────────────────────
//  BASS ENGINE — 大地・重力
//  一度鳴らしたら周波数を滑らかに変化させる
// ────────────────────────────────────────────
function onBassManageTick(time) {
  const wallNow = Date.now();

  if (!bassActive && envStats.density > 0.07) {
    bassSynth.triggerAttack(BASS_ROOTS[bassRootIdx], time, 0.52);
    bassActive      = true;
    lastBassMorphMs = wallNow;
    return;
  }

  if (bassActive && envStats.density < 0.03) {
    bassSynth.triggerRelease(time + 2.0);
    bassActive = false;
    return;
  }

  if (!bassActive) return;

  // ルート変化：15〜28秒ごと、20%の確率
  if (wallNow - lastBassMorphMs > 15000 && Math.random() < 0.20) {
    bassRootIdx = (bassRootIdx + 1) % BASS_ROOTS.length;
    // attack/releaseなし → 周波数がゆっくり滑る（gravitational drift）
    bassSynth.frequency.rampTo(
      Tone.Frequency(BASS_ROOTS[bassRootIdx]).toFrequency(),
      2.8, time
    );
    lastBassMorphMs = wallNow;
  }
}

// ────────────────────────────────────────────
//  UPDATE AUDIO（毎フレーム呼び出し）
// ────────────────────────────────────────────
function updateAudio(pts) {
  if (!toneReady) return;

  const raw = computeStats(pts, canvas.width, canvas.height);
  smoothStats(raw);

  // Piano音量：density + energy にリアルタイム追従（毎フレーム）
  if (pianoActiveNotes.length > 0) {
    const targetVol = -20 + envStats.density * 8 + envStats.energy * 5;
    pianoSynth.volume.rampTo(Math.max(-26, Math.min(-6, targetVol)), 0.12);
  }

  // Pianoフィルター連続変化：y偏差 → 明暗（上=bright/5000Hz、下=dark/400Hz）
  const yNorm = Math.max(0, Math.min(1, (envStats.meanY + 1) / 2));
  pianoFilterTarget = 5000 - yNorm * 4600;
  pianoFilterCurrent += (pianoFilterTarget - pianoFilterCurrent) * 0.028;
  pianoLPF.frequency.rampTo(pianoFilterCurrent, 0.2);

  // BPM表示（15フレームごと）
  if (++_bpmTick % 15 === 0) {
    const el = document.getElementById('bpmDisplay');
    if (el) el.textContent = Math.round(smoothBpm);
  }
}

// ════════════════════════════════════════════════════════════════════
//  CANVAS FIT
// ════════════════════════════════════════════════════════════════════
function fitCanvas() {
  const vw=video.videoWidth||640, vh=video.videoHeight||480;
  const sw=window.innerWidth,    sh=window.innerHeight;
  const vR=vw/vh, sR=sw/sh;
  let cw, ch;
  if (vR>sR) { cw=sw; ch=Math.round(sw/vR); }
  else        { ch=sh; cw=Math.round(sh*vR); }
  canvas.width=cw; canvas.height=ch;
  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
  canvas.style.left=Math.round((sw-cw)/2)+'px';
  canvas.style.top =Math.round((sh-ch)/2)+'px';
  prevGray=null; smoothDens=null; stableVerts=[];
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(fitCanvas, 250));

// ════════════════════════════════════════════════════════════════════
//  MOTION DETECTION
// ════════════════════════════════════════════════════════════════════
function toGray(data) {
  const g=new Uint8ClampedArray(data.length/4);
  for (let i=0,j=0;i<data.length;i+=4,j++) g[j]=(data[i]+data[i+1]+data[i+2])/3;
  return g;
}

function detectMotion(gray, prev) {
  const m=new Float32Array(gray.length);
  for (let i=0;i<gray.length;i++) { const d=Math.abs(gray[i]-prev[i]); m[i]=d>12?d:0; }
  return m;
}

function extractVertices(motion, w, h) {
  const GRID=6, RAD=10, MIN_DENS=380, DECAY=0.78;
  const gw=Math.floor((w-RAD*2)/GRID), gh=Math.floor((h-RAD*2)/GRID);
  if (!smoothDens || smoothDens.length!==gw*gh) smoothDens=new Float32Array(gw*gh);
  for (let gy=0;gy<gh;gy++) {
    for (let gx=0;gx<gw;gx++) {
      const cx=RAD+gx*GRID, cy=RAD+gy*GRID;
      let sum=0;
      for (let dy=-RAD;dy<=RAD;dy+=2)
        for (let dx=-RAD;dx<=RAD;dx+=2)
          sum+=motion[(cy+dy)*w+(cx+dx)];
      smoothDens[gy*gw+gx]=smoothDens[gy*gw+gx]*DECAY+sum*(1-DECAY);
    }
  }
  const pts=[];
  for (let gy=1;gy<gh-1;gy++) {
    for (let gx=1;gx<gw-1;gx++) {
      const d=smoothDens[gy*gw+gx];
      if (d<MIN_DENS) continue;
      let isMax=true;
      for (let dy=-1;dy<=1&&isMax;dy++)
        for (let dx=-1;dx<=1&&isMax;dx++) {
          if (dy===0&&dx===0) continue;
          if (smoothDens[(gy+dy)*gw+(gx+dx)]>d) isMax=false;
        }
      if (isMax) pts.push([RAD+gx*GRID, RAD+gy*GRID]);
    }
  }
  return pts;
}

function connectLines(pts) {
  const MAX=isMobile?30:80, src=pts.length>MAX?pts.slice(0,MAX):pts, lines=[];
  for (let i=0;i<src.length;i++) {
    const ds=[];
    for (let j=0;j<src.length;j++) {
      if (i===j) continue;
      const dx=src[j][0]-src[i][0], dy=src[j][1]-src[i][1];
      ds.push({index:j, dist:dx*dx+dy*dy});
    }
    ds.sort((a,b)=>a.dist-b.dist);
    for (let k=0;k<3&&ds[k];k++) lines.push([src[i], src[ds[k].index]]);
  }
  return lines;
}

// ════════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════════════════════════
function loop(now) {
  requestAnimationFrame(loop);
  if (++frameTick % FRAME_SKIP !== 0) return;

  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  if (currentFacing==='user') {
    ctx.save(); ctx.translate(W,0); ctx.scale(-1,1);
    ctx.drawImage(video,0,0,W,H); ctx.restore();
  } else {
    ctx.drawImage(video,0,0,W,H);
  }

  pCtx.drawImage(video,0,0,PROC_W,PROC_H);
  const frame=pCtx.getImageData(0,0,PROC_W,PROC_H);
  const gray=toGray(frame.data);

  if (prevGray) {
    const motion   = detectMotion(gray, prevGray);
    const rawVerts = extractVertices(motion, PROC_W, PROC_H);
    const sx=W/PROC_W, sy=H/PROC_H;
    const mapped = rawVerts.map(([x,y]) =>
      currentFacing==='user' ? [(PROC_W-1-x)*sx, y*sy] : [x*sx, y*sy]
    );

    const MERGE_DIST2=(W*0.12)**2, now=Date.now();
    for (const nv of mapped) {
      let merged=false;
      for (let i=0;i<stableVerts.length;i++) {
        const dx=stableVerts[i][0]-nv[0], dy=stableVerts[i][1]-nv[1];
        if (dx*dx+dy*dy<MERGE_DIST2) { stableVerts[i]=[nv[0],nv[1],now]; merged=true; break; }
      }
      if (!merged) {
        stableVerts.push([nv[0],nv[1],now]);
        if (stableVerts.length>10) stableVerts.shift();
      }
    }
    stableVerts=stableVerts.filter(v=>now-v[2]<2000);
    verts=stableVerts.map(v=>[v[0],v[1]]);

    updateAudio(verts);

    const lines=connectLines(verts).slice(0,25);
    const cx=W/2, cy=H/2;
    ctx.lineWidth=1;
    lines.forEach(([a,b]) => {
      ctx.strokeStyle='rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();
      if (showXY) {
        const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
        ctx.font='8px "Helvetica Neue",monospace';
        ctx.fillStyle='rgba(255,255,255,0.55)';
        ctx.fillText(`x:${Math.round(mx-cx)} y:${Math.round(my-cy)}`, mx+3, my-4);
      }
    });
    ctx.strokeStyle='rgba(255,255,255,0.85)';
    ctx.fillStyle='rgba(255,255,255,0.85)';
    verts.forEach(([x,y]) => { ctx.strokeRect(x-4,y-4,8,8); ctx.fillRect(x-2,y-2,4,4); });
  }
  prevGray=gray;
}

// ════════════════════════════════════════════════════════════════════
//  CAMERA
// ════════════════════════════════════════════════════════════════════
async function startStream(facing) {
  if (currentStream) { currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
  let stream;
  try {
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}},audio:false
    });
  } catch(e) { stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false}); }
  video.srcObject=stream; await video.play();
  currentStream=stream; currentFacing=facing;
  prevGray=null; smoothDens=null; stableVerts=[];
  if (video.readyState>=1) fitCanvas();
  else video.addEventListener('loadedmetadata', fitCanvas, {once:true});
}

// ════════════════════════════════════════════════════════════════════
//  UI CONTROLS
// ════════════════════════════════════════════════════════════════════

// ── X/Y toggle ──
xyBtn.addEventListener('click', () => {
  showXY=!showXY; xyBtn.classList.toggle('off', !showXY);
});

// ── Camera flip ──
flipBtn.addEventListener('click', async () => {
  flipBtn.style.opacity='0.4';
  try { await startStream(currentFacing==='user'?'environment':'user'); } catch(e){}
  flipBtn.style.opacity='1';
});

// ── Volume ──
const volTrack = document.getElementById('volTrack');
const volFill  = document.getElementById('volFill');
let   volLevel = 75;   // 0–100
let   volDrag  = false;

function volToDb(v) { return v === 0 ? -Infinity : -30 + (v / 100) * 30; }

function applyVol(v) {
  volLevel = Math.max(0, Math.min(100, Math.round(v)));
  volFill.style.height = volLevel + '%';
  if (toneReady) Tone.Destination.volume.value = volToDb(volLevel);
}

function volFromPointer(e) {
  const r = volTrack.getBoundingClientRect();
  const ratio = 1 - (e.clientY - r.top) / r.height;
  applyVol(ratio * 100);
}

volTrack.addEventListener('pointerdown', (e) => {
  volDrag = true;
  volTrack.setPointerCapture(e.pointerId);
  volFromPointer(e);
});
volTrack.addEventListener('pointermove', (e) => {
  if (volDrag) volFromPointer(e);
});
volTrack.addEventListener('pointerup',    () => { volDrag = false; });
volTrack.addEventListener('pointercancel',() => { volDrag = false; });

// ── BPM ──
const bpmBtn    = document.getElementById('bpmBtn');
const bpmSlider = document.getElementById('bpmSlider');
const bpmRange  = document.getElementById('bpmRange');
const bpmLabel  = document.getElementById('bpmLabel');
let   bpmOpen   = false;

bpmBtn.addEventListener('click', () => {
  bpmOpen=!bpmOpen; bpmSlider.style.display=bpmOpen?'flex':'none';
});
bpmRange.addEventListener('input', () => {
  userBpm=parseInt(bpmRange.value);
  bpmLabel.textContent=userBpm;
});

// BPMスライダー外タップで閉じる
document.addEventListener('click', (e) => {
  if (bpmOpen && !bpmBtn.contains(e.target) && !bpmSlider.contains(e.target)) {
    bpmOpen=false; bpmSlider.style.display='none';
  }
});

// ── Wake Lock ──
let wakeLock=null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) try { wakeLock=await navigator.wakeLock.request('screen'); } catch(e){}
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    await resumeAudio();
    if (wakeLock) requestWakeLock();
  }
});
document.addEventListener('touchstart', resumeAudio, { passive: true });
document.addEventListener('click', resumeAudio, { passive: true });

// ── Start ──
async function startCamera() {
  try {
    await initAudio();
    await startStream('user');
    startButton.style.display='none';
    [flipBtn, xyBtn, bpmBtn].forEach(b => b.style.display='flex');
    volTrack.style.display = 'block';
    await requestWakeLock();
    requestAnimationFrame(loop);
  } catch(e) {
    alert('カメラ許可が必要です');
    console.error(e);
  }
}
startButton.addEventListener('click', startCamera);

// ── PWA: Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
